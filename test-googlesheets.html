<!DOCTYPE html>
<html>
<head>
    <title>Google Sheets Test</title>
</head>
<body>
    <h1>Google Sheets Integration Test</h1>
    <button onclick="testGoogleSheets()">Test Google Sheets</button>
    <div id="result"></div>

    <script>
        async function testGoogleSheets() {
            const resultDiv = document.getElementById('result');
            const GOOGLE_APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxmEeyiJu6ri-M4XOZBRozHXxwG8MiZ7LWDmWYr27xEyBpbLXPpH3xPAP50xsbVtCk8/exec';
            
            const testData = {
                name: "Test User",
                dob: "2000-01-01",
                place: "Test City",
                gender: "male",
                contact: "1234567890",
                address: "Test Address",
                batch: "morning",
                applicant_signature: "Test User",
                guardian_signature: "Guardian User",
                declaration: "true"
            };
            
            resultDiv.innerHTML = "Testing...";
            
            try {
                // Create a unique ID for this submission
                const submissionId = 'test_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                
                // Encode the data as URL parameters
                const params = new URLSearchParams({
                    id: submissionId,
                    name: testData.name || '',
                    dob: testData.dob || '',
                    place: testData.place || '',
                    gender: testData.gender || '',
                    contact: testData.contact || '',
                    address: testData.address || '',
                    batch: testData.batch || '',
                    applicant_signature: testData.applicant_signature || '',
                    guardian_signature: testData.guardian_signature || '',
                    declaration: testData.declaration ? 'true' : 'false',
                    timestamp: new Date().toISOString()
                });
                
                // Use image pixel approach (bypasses CSP connect-src restrictions)
                const img = new Image();
                img.src = GOOGLE_APPS_SCRIPT_URL + '?' + params.toString();
                
                // Wait for the image to load/fail
                await new Promise((resolve) => {
                    img.onload = () => {
                        console.log('Test image pixel method succeeded');
                        resolve();
                    };
                    
                    img.onerror = () => {
                        console.log('Test image pixel method failed, but data might still be sent');
                        resolve();
                    };
                    
                    // Fallback timeout
                    setTimeout(() => {
                        console.log('Test image pixel method timeout, assuming success');
                        resolve();
                    }, 2000);
                });
                
                resultDiv.innerHTML = "✅ Test request sent successfully! Check your Google Sheet for the test data.";
                console.log('Test completed');
            } catch (error) {
                resultDiv.innerHTML = "❌ Error: " + error.message;
                console.error('Test error:', error);
            }
        }
    </script>
</body>
</html>
